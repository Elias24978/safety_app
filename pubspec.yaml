name: safety_app
description: A new Flutter project.
publish_to: 'none' # Previene publicación en pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase y Notificaciones
  awesome_notifications:
    git:
      url: https://github.com/rafaelsetragni/awesome_notifications.git
      ref: master

  firebase_core: ^2.31.0
  firebase_messaging: ^14.7.9
  cloud_firestore: ^4.17.3
  firebase_auth: ^4.19.2

  # Almacenamiento Local y Utilidades
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  intl: ^0.20.2
  logging: ^1.2.0
  flutter_dotenv: ^5.1.0

  # UI y otros
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.6.1
  geolocator: 12.0.0
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.8
  hive_generator: ^2.0.1

  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
