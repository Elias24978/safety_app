name: safety_app
description: A new Flutter project.
publish_to: 'none' # Previene publicación en pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase y Notificaciones
  awesome_notifications:
    git:
      url: https://github.com/rafaelsetragni/awesome_notifications.git
      ref: master
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  cloud_firestore: ^6.0.0
  firebase_auth: ^6.0.0

  # Para manejar el estado de la selección
  provider: ^6.1.2

  # Para guardar la selección en el dispositivo
  shared_preferences: ^2.2.3
  purchases_flutter: ^9.2.0 # Usa la última versión

  # Almacenamiento Local y Utilidades
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  intl: ^0.20.2
  logging: ^1.2.0
  flutter_dotenv: ^5.2.1

  change_app_package_name: ^1.5.0 # Agrega esta línea

  # UI y otros
  cupertino_icons: ^1.0.8
  google_maps_flutter: 
  geolocator: ^14.0.2
  font_awesome_flutter: ^10.7.0
  google_mobile_ads: ^6.0.0 # Usa la última versión
  http: ^1.2.1 # O la versión que se haya instalado
  url_launcher: ^6.3.2
  dio: ^5.8.0+1
  permission_handler: ^12.0.1
  flutter_pdfview: ^1.4.1+1
  device_info_plus: ^11.5.0 # Añade esta línea

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.8
  hive_generator: ^2.0.1

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env